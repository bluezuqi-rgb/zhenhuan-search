<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>甄学检索局：台词找镜头</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'Microsoft YaHei', sans-serif;
            background: #fafafa;
            color: #1a1a1a;
            min-height: 100vh;
        }

        /* 搜索区域 */
        .search-container {
            background: #1a1a1a;
            padding: 80px 20px;
            text-align: center;
            position: relative;
            overflow: hidden;
        }

        .search-container::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background:
                radial-gradient(circle at 20% 50%, rgba(255,255,255,0.03) 0%, transparent 50%),
                radial-gradient(circle at 80% 50%, rgba(255,255,255,0.03) 0%, transparent 50%);
            pointer-events: none;
        }

        .search-title {
            color: #fff;
            position: relative;
            animation: fadeInDown 0.8s ease-out;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 8px;
        }

        .title-main {
            font-size: 3.2em;
            font-weight: 200;
            letter-spacing: 12px;
            position: relative;
            display: inline-block;
            /* 气体薄膜鼓起效果 */
            background: linear-gradient(
                180deg,
                rgba(255,255,255,0.95) 0%,
                rgba(255,255,255,0.85) 30%,
                rgba(255,255,255,0.7) 70%,
                rgba(255,255,255,0.5) 100%
            );
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            text-shadow: none;
            filter: drop-shadow(0 0 25px rgba(255,255,255,0.4))
                    drop-shadow(0 0 50px rgba(255,255,255,0.2))
                    drop-shadow(0 2px 3px rgba(0,0,0,0.3));
            animation: breathe 4s ease-in-out infinite;
        }

        /* 呼吸动画 - 模拟薄膜鼓起收缩 */
        @keyframes breathe {
            0%, 100% {
                filter: drop-shadow(0 0 25px rgba(255,255,255,0.4))
                        drop-shadow(0 0 50px rgba(255,255,255,0.2))
                        drop-shadow(0 2px 3px rgba(0,0,0,0.3));
                transform: scale(1);
            }
            50% {
                filter: drop-shadow(0 0 35px rgba(255,255,255,0.5))
                        drop-shadow(0 0 70px rgba(255,255,255,0.3))
                        drop-shadow(0 2px 3px rgba(0,0,0,0.3));
                transform: scale(1.01);
            }
        }

        /* 薄膜底层光晕 */
        .title-main::before {
            content: '甄学检索局';
            position: absolute;
            top: 0;
            left: 0;
            letter-spacing: 12px;
            font-weight: 200;
            background: linear-gradient(
                180deg,
                rgba(255,255,255,0.3) 0%,
                rgba(255,255,255,0.1) 100%
            );
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            filter: blur(12px);
            z-index: -1;
        }

        /* 高光层 */
        .title-main::after {
            content: '';
            display: block;
            width: 100px;
            height: 1px;
            background: linear-gradient(90deg, transparent, rgba(255,255,255,0.7), transparent);
            margin: 18px auto 0;
            box-shadow: 0 0 15px rgba(255,255,255,0.3);
        }

        .title-sub {
            font-size: 1.1em;
            font-weight: 300;
            letter-spacing: 8px;
            opacity: 0.7;
            text-shadow: 0 0 10px rgba(255,255,255,0.2);
        }

        @keyframes fadeInDown {
            from {
                opacity: 0;
                transform: translateY(-30px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .search-box {
            display: flex;
            width: 100%;
            max-width: 650px;
            margin: 0 auto;
            position: relative;
            animation: fadeInUp 0.8s ease-out 0.2s both;
        }

        @keyframes fadeInUp {
            from {
                opacity: 0;
                transform: translateY(30px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .search-input {
            flex: 1;
            padding: 18px 28px;
            font-size: 16px;
            border: 1px solid #333;
            background: #fff;
            color: #1a1a1a;
            outline: none;
            transition: all 0.3s ease;
            letter-spacing: 1px;
        }

        .search-input:focus {
            border-color: #fff;
            box-shadow: 0 0 0 3px rgba(255,255,255,0.1);
        }

        .search-input::placeholder {
            color: #999;
        }

        .search-btn {
            padding: 18px 40px;
            font-size: 14px;
            font-weight: 500;
            letter-spacing: 3px;
            background: #fff;
            color: #1a1a1a;
            border: none;
            cursor: pointer;
            transition: all 0.3s ease;
            position: relative;
            overflow: hidden;
        }

        .search-btn::before {
            content: '';
            position: absolute;
            top: 0;
            left: -100%;
            width: 100%;
            height: 100%;
            background: linear-gradient(90deg, transparent, rgba(0,0,0,0.1), transparent);
            transition: left 0.5s ease;
        }

        .search-btn:hover {
            background: #f0f0f0;
        }

        .search-btn:hover::before {
            left: 100%;
        }

        .search-btn:active {
            transform: scale(0.98);
        }

        /* 统计信息 */
        .stats-bar {
            background: #fff;
            border-bottom: 1px solid #eee;
            padding: 15px 30px;
            display: flex;
            justify-content: center;
            gap: 40px;
            font-size: 13px;
            color: #666;
        }

        .stat-item {
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .stat-number {
            font-size: 18px;
            font-weight: 600;
            color: #1a1a1a;
        }

        /* 结果区域 */
        .results-container {
            padding: 40px 30px;
            max-width: 1400px;
            margin: 0 auto;
        }

        .results-info {
            color: #666;
            margin-bottom: 30px;
            font-size: 14px;
            padding-bottom: 20px;
            border-bottom: 1px solid #eee;
        }

        .results-info strong {
            color: #1a1a1a;
            font-weight: 600;
        }

        .results-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
            gap: 25px;
        }

        /* 结果卡片 */
        .result-item {
            background: #fff;
            border: 1px solid #eee;
            overflow: hidden;
            cursor: pointer;
            transition: all 0.4s cubic-bezier(0.25, 0.46, 0.45, 0.94);
            position: relative;
        }

        .result-item::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            height: 3px;
            background: #1a1a1a;
            transform: scaleX(0);
            transition: transform 0.3s ease;
        }

        .result-item:hover {
            transform: translateY(-8px);
            box-shadow: 0 20px 40px rgba(0,0,0,0.1);
            border-color: #ddd;
        }

        .result-item:hover::before {
            transform: scaleX(1);
        }

        .result-image-wrapper {
            position: relative;
            overflow: hidden;
            background: #f5f5f5;
        }

        .result-image {
            width: 100%;
            height: 180px;
            object-fit: cover;
            transition: transform 0.6s ease;
        }

        .result-item:hover .result-image {
            transform: scale(1.05);
        }

        .result-image-overlay {
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(0,0,0,0);
            display: flex;
            align-items: center;
            justify-content: center;
            transition: background 0.3s ease;
        }

        .result-item:hover .result-image-overlay {
            background: rgba(0,0,0,0.3);
        }

        .result-image-overlay::after {
            content: '查看详情';
            color: #fff;
            font-size: 12px;
            letter-spacing: 2px;
            padding: 8px 16px;
            border: 1px solid #fff;
            opacity: 0;
            transform: translateY(10px);
            transition: all 0.3s ease;
        }

        .result-item:hover .result-image-overlay::after {
            opacity: 1;
            transform: translateY(0);
        }

        .result-info {
            padding: 20px;
        }

        .result-text {
            font-size: 14px;
            color: #333;
            line-height: 1.8;
            margin-bottom: 15px;
            display: -webkit-box;
            -webkit-line-clamp: 2;
            -webkit-box-orient: vertical;
            overflow: hidden;
        }

        .result-meta {
            display: flex;
            justify-content: space-between;
            align-items: center;
            font-size: 12px;
            color: #999;
        }

        .result-episode {
            display: flex;
            align-items: center;
            gap: 6px;
        }

        .result-episode::before {
            content: '';
            width: 4px;
            height: 4px;
            background: #1a1a1a;
            border-radius: 50%;
        }

        .result-score {
            background: #1a1a1a;
            color: #fff;
            padding: 4px 10px;
            font-size: 11px;
            letter-spacing: 1px;
            transition: all 0.3s ease;
        }

        .result-item:hover .result-score {
            background: #333;
        }

        /* 弹窗 */
        .modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.9);
            z-index: 1000;
            align-items: center;
            justify-content: center;
            animation: fadeIn 0.3s ease;
        }

        .modal.active {
            display: flex;
        }

        @keyframes fadeIn {
            from { opacity: 0; }
            to { opacity: 1; }
        }

        .modal-content {
            background: #fff;
            max-width: 950px;
            max-height: 90vh;
            overflow: hidden;
            animation: slideUp 0.4s ease;
        }

        @keyframes slideUp {
            from {
                opacity: 0;
                transform: translateY(50px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .modal-image-container {
            background: #1a1a1a;
            position: relative;
            text-align: center;
        }

        .modal-image {
            max-width: 100%;
            max-height: 55vh;
            object-fit: contain;
            cursor: pointer;
            display: inline-block;
        }

        .modal-image:active {
            cursor: grabbing;
        }

        .modal-image.dragging {
            opacity: 0.7;
            transform: scale(0.98);
        }

        /* 拖拽提示 */
        .drag-hint {
            position: absolute;
            bottom: 15px;
            left: 50%;
            transform: translateX(-50%);
            background: rgba(0,0,0,0.7);
            color: #fff;
            padding: 8px 16px;
            font-size: 12px;
            letter-spacing: 1px;
            border-radius: 20px;
            opacity: 0;
            transition: opacity 0.3s ease;
            pointer-events: none;
        }

        .modal-image-container:hover .drag-hint {
            opacity: 1;
        }

        /* 复制成功提示 */
        .copy-toast {
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            background: #1a1a1a;
            color: #fff;
            padding: 15px 30px;
            font-size: 14px;
            letter-spacing: 2px;
            border-radius: 8px;
            z-index: 2000;
            opacity: 0;
            transition: opacity 0.3s ease;
            pointer-events: none;
        }

        .copy-toast.show {
            opacity: 1;
        }

        .modal-close {
            position: absolute;
            top: 15px;
            right: 15px;
            width: 40px;
            height: 40px;
            background: rgba(255,255,255,0.1);
            border: 1px solid rgba(255,255,255,0.3);
            color: #fff;
            font-size: 20px;
            cursor: pointer;
            transition: all 0.3s ease;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .modal-close:hover {
            background: rgba(255,255,255,0.2);
            transform: rotate(90deg);
        }

        .modal-info {
            padding: 30px;
        }

        .modal-text {
            font-size: 18px;
            color: #1a1a1a;
            margin-bottom: 20px;
            line-height: 1.8;
            font-weight: 400;
        }

        .modal-meta {
            display: flex;
            gap: 30px;
            color: #666;
            font-size: 13px;
            margin-bottom: 25px;
            padding-bottom: 25px;
            border-bottom: 1px solid #eee;
        }

        .modal-meta span {
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .modal-actions {
            display: flex;
            gap: 15px;
        }

        .modal-btn {
            padding: 14px 30px;
            font-size: 12px;
            letter-spacing: 2px;
            border: none;
            cursor: pointer;
            transition: all 0.3s ease;
            font-weight: 500;
        }

        .modal-btn.download {
            background: #1a1a1a;
            color: #fff;
        }

        .modal-btn.download:hover {
            background: #333;
            transform: translateX(5px);
        }

        .modal-btn.close {
            background: #f5f5f5;
            color: #666;
            border: 1px solid #eee;
        }

        .modal-btn.close:hover {
            background: #eee;
        }

        /* 空状态 */
        .empty-state {
            text-align: center;
            padding: 80px 20px;
            color: #999;
        }

        .empty-state h3 {
            font-size: 18px;
            font-weight: 400;
            color: #666;
            margin-bottom: 10px;
        }

        .empty-state p {
            font-size: 14px;
        }

        /* 加载动画 */
        .loading {
            text-align: center;
            padding: 60px;
            color: #666;
        }

        .loading::after {
            content: '';
            display: inline-block;
            width: 20px;
            height: 20px;
            border: 2px solid #eee;
            border-top-color: #1a1a1a;
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
            margin-left: 10px;
            vertical-align: middle;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        /* 页脚 */
        .footer {
            text-align: center;
            padding: 40px 20px;
            color: #999;
            font-size: 12px;
            border-top: 1px solid #eee;
            margin-top: 40px;
        }

        /* 响应式 */
        @media (max-width: 768px) {
            .search-title {
                font-size: 1.8em;
                letter-spacing: 4px;
            }

            .search-box {
                flex-direction: column;
            }

            .search-input, .search-btn {
                width: 100%;
            }

            .results-grid {
                grid-template-columns: 1fr;
            }

            .stats-bar {
                flex-direction: column;
                gap: 15px;
            }
        }
    </style>
</head>
<body>
    <!-- 搜索区域 -->
    <div class="search-container">
        <h1 class="search-title">
            <span class="title-main">甄学检索局</span>
            <span class="title-sub">台词找镜头</span>
        </h1>
        <div class="search-box">
            <input type="text" class="search-input" id="searchInput" placeholder="输入台词关键词，如：康熙、选秀、华妃..." autofocus>
            <button class="search-btn" onclick="search()">搜 索</button>
        </div>
    </div>

    <!-- 统计信息 -->
    <div class="stats-bar" id="statsBar" style="display: none;">
        <div class="stat-item">
            <span class="stat-number" id="totalCount">0</span>
            <span>条字幕</span>
        </div>
        <div class="stat-item">
            <span class="stat-number" id="episodeCount">0</span>
            <span>集</span>
        </div>
    </div>

    <!-- 结果区域 -->
    <div class="results-container" id="resultsContainer" style="display: none;">
        <p class="results-info" id="resultsInfo"></p>
        <div class="results-grid" id="resultsGrid"></div>
    </div>

    <!-- 弹窗 -->
    <div class="modal" id="modal" onclick="closeModal(event)">
        <div class="modal-content" onclick="event.stopPropagation()">
            <div class="modal-image-container">
                <img class="modal-image" id="modalImage" src="" oncontextmenu="return true;">
                <span class="drag-hint">点击「复制图片」按钮，Ctrl+V 粘贴到微信/QQ</span>
                <button class="modal-close" onclick="closeModal()">×</button>
            </div>
            <div class="modal-info">
                <p class="modal-text" id="modalText"></p>
                <div class="modal-meta">
                    <span id="modalEpisode"></span>
                    <span id="modalTime"></span>
                </div>
                <div class="modal-actions">
                    <button class="modal-btn download" onclick="downloadImage()">下载图片</button>
                    <button class="modal-btn" onclick="copyImageToClipboard()" style="background: #333; color: #fff;">复制图片</button>
                    <button class="modal-btn close" onclick="closeModal()">关闭</button>
                </div>
            </div>
        </div>
    </div>

    <!-- 复制成功提示 -->
    <div class="copy-toast" id="copyToast">已复制到剪贴板</div>

    <script>
        // 全局数据
        let indexData = null;
        let currentResults = [];

        // 加载索引数据
        async function loadIndex() {
            try {
                const response = await fetch('data/index.json');
                indexData = await response.json();
                console.log('索引加载完成:', indexData.total, '条记录');

                // 显示统计信息
                document.getElementById('totalCount').textContent = indexData.total;
                document.getElementById('episodeCount').textContent = indexData.episodes.length;
                document.getElementById('statsBar').style.display = 'flex';
            } catch (error) {
                console.error('加载索引失败:', error);
            }
        }

        // 分词函数
        function tokenize(text) {
            const cleanText = text.replace(/[，。！？、；：""''（）【】《》\s]+/g, '');
            const tokens = new Set();

            for (let char of cleanText) {
                tokens.add(char);
            }

            for (let i = 0; i < cleanText.length; i++) {
                for (let len = 2; len <= 4; len++) {
                    if (i + len <= cleanText.length) {
                        tokens.add(cleanText.substring(i, i + len));
                    }
                }
            }

            return Array.from(tokens);
        }

        // 计算匹配度
        function calculateScore(searchTokens, item) {
            const itemKeywords = item.keywords;
            let matchCount = 0;

            for (let token of searchTokens) {
                if (itemKeywords.includes(token) || item.text.includes(token)) {
                    matchCount++;
                }
            }

            return matchCount / searchTokens.length;
        }

        // 搜索函数
        function search() {
            const query = document.getElementById('searchInput').value.trim();

            if (!query) {
                alert('请输入搜索关键词');
                return;
            }

            if (!indexData) {
                alert('索引数据未加载');
                return;
            }

            const searchTokens = tokenize(query);
            console.log('搜索关键词:', searchTokens);

            const results = [];
            for (let item of indexData.subtitles) {
                const score = calculateScore(searchTokens, item);
                if (score > 0) {
                    results.push({
                        ...item,
                        score: score
                    });
                }
            }

            results.sort((a, b) => b.score - a.score);

            currentResults = results;
            displayResults(results, query);
        }

        // 显示结果
        function displayResults(results, query) {
            const container = document.getElementById('resultsContainer');
            const grid = document.getElementById('resultsGrid');
            const info = document.getElementById('resultsInfo');

            container.style.display = 'block';

            if (results.length === 0) {
                info.innerHTML = `未找到包含 "<strong>${query}</strong>" 的结果`;
                grid.innerHTML = `
                    <div class="empty-state" style="grid-column: 1/-1;">
                        <h3>未找到相关结果</h3>
                        <p>试试其他关键词</p>
                    </div>
                `;
                return;
            }

            info.innerHTML = `找到 <strong>${results.length}</strong> 条包含 "<strong>${query}</strong>" 的结果`;

            grid.innerHTML = results.map((item, index) => `
                <div class="result-item" onclick="showDetail('${item.image}', '${item.text.replace(/'/g, "\\'")}', ${item.episode}, '${item.time}')" style="animation: fadeInUp 0.5s ease ${index * 0.05}s both;">
                    <div class="result-image-wrapper">
                        <img class="result-image" src="${IMAGE_CDN}/${item.image}" loading="lazy" onerror="this.style.background='#f0f0f0'">
                        <div class="result-image-overlay"></div>
                    </div>
                    <div class="result-info">
                        <p class="result-text">${item.text}</p>
                        <div class="result-meta">
                            <span class="result-episode">第${item.episode}集 ${item.time}</span>
                            <span class="result-score">${(item.score * 100).toFixed(0)}%</span>
                        </div>
                    </div>
                </div>
            `).join('');
        }

        // 图片CDN域名配置
        const IMAGE_CDN = 'https://zhenhuan-images-1421649717.cos.ap-guangzhou.myqcloud.com/full_frames';

        // 显示详情弹窗
        function showDetail(image, text, episode, time) {
            const modalImage = document.getElementById('modalImage');
            const imageUrl = IMAGE_CDN + '/' + image;
            modalImage.src = imageUrl;

            document.getElementById('modalText').textContent = text;
            document.getElementById('modalEpisode').textContent = '第 ' + episode + ' 集';
            document.getElementById('modalTime').textContent = '时间: ' + time;
            document.getElementById('modal').classList.add('active');
            document.body.style.overflow = 'hidden';

            window.currentImage = {
                filename: image,
                path: imageUrl
            };

            // 预加载图片用于复制
            preloadImageForCopy(imageUrl, image);
        }

        // 预加载图片并缓存 Blob（用于复制）
        let cachedImageBlob = null;
        let cachedImageName = null;

        async function preloadImageForCopy(imageUrl, filename) {
            try {
                const response = await fetch(imageUrl);
                cachedImageBlob = await response.blob();
                cachedImageName = filename;
            } catch (err) {
                console.error('预加载图片失败:', err);
            }
        }

        // 复制图片到剪贴板（通过 Canvas 转换为 PNG）
        async function copyImageToClipboard() {
            if (!window.currentImage) return;

            try {
                // 使用 Canvas 方式复制图片
                const img = document.getElementById('modalImage');

                // 创建 Canvas
                const canvas = document.createElement('canvas');
                canvas.width = img.naturalWidth;
                canvas.height = img.naturalHeight;

                const ctx = canvas.getContext('2d');
                ctx.drawImage(img, 0, 0);

                // 转换为 PNG Blob
                canvas.toBlob(async function(blob) {
                    try {
                        // 写入剪贴板，必须用 'image/png' 作为键名
                        await navigator.clipboard.write([
                            new ClipboardItem({ 'image/png': blob })
                        ]);
                        showToast('图片已复制，可粘贴到微信');
                    } catch (err) {
                        console.error('剪贴板写入失败:', err);
                        showToast('复制失败，请右键图片复制');
                    }
                }, 'image/png');

            } catch (err) {
                console.error('复制失败:', err);
                showToast('复制失败，请右键图片复制');
            }
        }

        // 显示提示
        function showToast(message) {
            const toast = document.getElementById('copyToast');
            toast.textContent = message;
            toast.classList.add('show');
            setTimeout(() => {
                toast.classList.remove('show');
            }, 2000);
        }

        // 关闭弹窗
        function closeModal(event) {
            if (event && event.target !== document.getElementById('modal')) return;
            document.getElementById('modal').classList.remove('active');
            document.body.style.overflow = '';
        }

        // 下载图片
        function downloadImage() {
            if (!window.currentImage) return;

            const link = document.createElement('a');
            link.href = window.currentImage.path;
            link.download = window.currentImage.filename;
            link.click();
        }

        // 键盘事件
        document.getElementById('searchInput').addEventListener('keypress', function(e) {
            if (e.key === 'Enter') {
                search();
            }
        });

        document.addEventListener('keydown', function(e) {
            if (e.key === 'Escape') {
                document.getElementById('modal').classList.remove('active');
                document.body.style.overflow = '';
            }
        });

        // 页面加载时加载索引
        loadIndex();
    </script>
</body>
</html>
